<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Lost Boys Breaks - NFL Break Board</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    font-family: 'Barlow Condensed', sans-serif;
  }

  .board {
    width: 1920px;
    height: 1080px;
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 3px;
    padding: 3px;
    background: #111;
    position: relative;
  }

  /* === TEAM TILE === */
  .tile {
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: default;
    transition: all 0.35s ease;
    background: var(--bg);
  }

  /* Subtle inner bevel/shine */
  .tile::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(255,255,255,0.12) 0%, transparent 40%, transparent 80%, rgba(0,0,0,0.15) 100%);
    z-index: 1;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .tile-logo {
    width: 68%;
    height: 55%;
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 3px 6px rgba(0,0,0,0.45));
    transition: all 0.4s ease;
  }

  .tile-abbr {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 3px;
    color: #fff;
    padding: 3px 0;
    background: rgba(0,0,0,0.55);
    z-index: 3;
    transition: all 0.3s;
  }

  /* === CENTER LOGO TILE === */
  .logo-tile {
    grid-column: 4 / 6;
    grid-row: 3 / 5;
    background: #08081a !important;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border: 2px solid rgba(120, 60, 200, 0.4);
  }

  .logo-tile .logo-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at center, rgba(123,47,190,0.2) 0%, transparent 70%),
      linear-gradient(135deg, #0a0a2a 0%, #0d0d1f 100%);
  }

  /* Circuit pattern on logo tile */
  .logo-tile .logo-circuits {
    position: absolute;
    inset: 0;
    opacity: 0.06;
    background-image:
      linear-gradient(90deg, #06D6E0 1px, transparent 1px),
      linear-gradient(0deg, #06D6E0 1px, transparent 1px);
    background-size: 30px 30px;
  }

  .logo-tile .logo-img {
    width: 75%;
    max-height: 50%;
    object-fit: contain;
    position: relative;
    z-index: 2;
    filter: drop-shadow(0 0 20px rgba(6,214,224,0.25));
  }

  .logo-tile .break-info {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-top: 10px;
  }

  .logo-tile .break-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    color: #06D6E0;
    letter-spacing: 4px;
    text-shadow: 0 0 12px rgba(6,214,224,0.4);
  }

  .logo-tile .box-info {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: rgba(255,255,255,0.6);
    letter-spacing: 1px;
    margin-top: 2px;
  }

  .logo-tile .stats-row {
    display: flex;
    gap: 30px;
    margin-top: 12px;
    position: relative;
    z-index: 2;
  }

  .logo-tile .stat-item {
    text-align: center;
  }

  .logo-tile .stat-label {
    font-size: 10px;
    font-weight: 700;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  .logo-tile .stat-val {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    line-height: 1;
  }

  .logo-tile .stat-val.hits { color: #06D6E0; text-shadow: 0 0 8px rgba(6,214,224,0.4); }
  .logo-tile .stat-val.claimed { color: #A855F7; text-shadow: 0 0 8px rgba(168,85,247,0.4); }

  /* === CLAIMED STATE === */
  .tile.claimed {
    background: #1a1a1a !important;
  }

  .tile.claimed::before {
    background: linear-gradient(160deg, rgba(255,255,255,0.03) 0%, transparent 40%, transparent 80%, rgba(0,0,0,0.3) 100%);
  }

  .tile.claimed .tile-logo {
    filter: grayscale(0.6) brightness(0.4) drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    opacity: 0.45;
  }

  .tile.claimed .tile-abbr {
    background: #00CC66;
    color: #000;
    font-weight: 700;
  }

  .tile .buyer-name {
    position: absolute;
    bottom: 28px;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: #00FF88;
    text-transform: uppercase;
    letter-spacing: 1px;
    z-index: 5;
    text-shadow: 0 0 10px rgba(0,255,136,0.6), 0 2px 4px rgba(0,0,0,0.9);
    opacity: 0;
    transform: translateY(5px);
    transition: all 0.35s ease;
    padding: 0 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .tile.claimed .buyer-name {
    opacity: 1;
    transform: translateY(0);
  }

  /* Claimed checkmark */
  .tile .check {
    position: absolute;
    top: 5px;
    right: 5px;
    width: 22px;
    height: 22px;
    background: #00FF88;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
    opacity: 0;
    transform: scale(0);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 0 8px rgba(0,255,136,0.6);
  }

  .tile .check svg {
    width: 12px;
    height: 12px;
    stroke: #000;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tile.claimed .check {
    opacity: 1;
    transform: scale(1);
  }

  /* Claim flash animation */
  @keyframes claimFlash {
    0% { box-shadow: inset 0 0 0 0 rgba(0,255,136,0.5); }
    30% { box-shadow: inset 0 0 40px 10px rgba(0,255,136,0.2); }
    100% { box-shadow: inset 0 0 0 0 rgba(0,255,136,0); }
  }

  .tile.claim-animate {
    animation: claimFlash 0.7s ease-out;
  }

  /* Sparkles */
  @keyframes sparkle {
    0% { opacity: 1; transform: translate(0,0) scale(1); }
    100% { opacity: 0; transform: translate(var(--sx), var(--sy)) scale(0); }
  }

  .sparkle {
    position: absolute;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #00FF88;
    box-shadow: 0 0 4px #00FF88;
    pointer-events: none;
    z-index: 30;
    animation: sparkle 0.6s ease-out forwards;
  }
</style>
</head>
<body>
<div class="board" id="board"></div>

<script>
const NFL_TEAMS = [
  { abbr: "ARI", name: "Cardinals", bg: "#97233F" },
  { abbr: "ATL", name: "Falcons", bg: "#A71930" },
  { abbr: "BAL", name: "Ravens", bg: "#241773" },
  { abbr: "BUF", name: "Bills", bg: "#00338D" },
  { abbr: "CAR", name: "Panthers", bg: "#0085CA" },
  { abbr: "CHI", name: "Bears", bg: "#0B162A" },
  { abbr: "CIN", name: "Bengals", bg: "#FB4F14" },
  { abbr: "CLE", name: "Browns", bg: "#311D00" },
  { abbr: "DAL", name: "Cowboys", bg: "#003594" },
  { abbr: "DEN", name: "Broncos", bg: "#002244" },
  { abbr: "DET", name: "Lions", bg: "#0076B6" },
  { abbr: "GB",  name: "Packers", bg: "#203731" },
  { abbr: "HOU", name: "Texans", bg: "#03202F" },
  { abbr: "IND", name: "Colts", bg: "#002C5F" },
  { abbr: "JAX", name: "Jaguars", bg: "#006778" },
  { abbr: "KC",  name: "Chiefs", bg: "#E31837" },
  { abbr: "LAC", name: "Chargers", bg: "#0080C6" },
  { abbr: "LAR", name: "Rams", bg: "#003594" },
  { abbr: "LV",  name: "Raiders", bg: "#A5ACAF" },
  { abbr: "MIA", name: "Dolphins", bg: "#008E97" },
  { abbr: "MIN", name: "Vikings", bg: "#4F2683" },
  { abbr: "NE",  name: "Patriots", bg: "#002244" },
  { abbr: "NO",  name: "Saints", bg: "#D3BC8D" },
  { abbr: "NYG", name: "Giants", bg: "#0B2265" },
  { abbr: "NYJ", name: "Jets", bg: "#125740" },
  { abbr: "PHI", name: "Eagles", bg: "#004C54" },
  { abbr: "PIT", name: "Steelers", bg: "#101820" },
  { abbr: "SEA", name: "Seahawks", bg: "#002244" },
  { abbr: "SF",  name: "49ers", bg: "#AA0000" },
  { abbr: "TB",  name: "Buccaneers", bg: "#D50A0A" },
  { abbr: "TEN", name: "Titans", bg: "#0C2340" },
  { abbr: "WAS", name: "Commanders", bg: "#5A1414" }
];

function getLogoUrl(abbr) {
  const m = { ARI:'ari',ATL:'atl',BAL:'bal',BUF:'buf',CAR:'car',CHI:'chi',CIN:'cin',CLE:'cle',DAL:'dal',DEN:'den',DET:'det',GB:'gb',HOU:'hou',IND:'ind',JAX:'jax',KC:'kc',LV:'lv',LAC:'lac',LAR:'lar',MIA:'mia',MIN:'min',NE:'ne',NO:'no',NYG:'nyg',NYJ:'nyj',PHI:'phi',PIT:'pit',SF:'sf',SEA:'sea',TB:'tb',TEN:'ten',WAS:'wsh' };
  return `https://a.espncdn.com/i/teamlogos/nfl/500/${m[abbr]}.png`;
}

let boardState = {};
try { const s = localStorage.getItem('nflBreakBoard'); if (s) boardState = JSON.parse(s); } catch(e) {}
function saveState() { localStorage.setItem('nflBreakBoard', JSON.stringify(boardState)); }

const board = document.getElementById('board');

// Grid: 8 cols x 5 rows = 40 cells
// Logo tile at center: col 4-5, row 3-4 (takes 4 cells)
// That leaves 36 cells for 32 teams + we need to skip 4 cells
// Layout plan:
// Row 1: 8 teams (0-7)
// Row 2: 8 teams (8-15)
// Row 3: 3 teams (16-18), LOGO (2 cols), 3 teams (19-21)
// Row 4: 3 teams (22-24), LOGO cont, 3 teams (25-27)
// Row 5: 4 teams (28-31) + 4 empty/filler

// Build cells in order
let teamIdx = 0;

for (let row = 0; row < 5; row++) {
  for (let col = 0; col < 8; col++) {
    // Logo tile at col 3-4, row 2-3 (0-indexed)
    if (row === 2 && col === 3) {
      const logoDiv = document.createElement('div');
      logoDiv.className = 'logo-tile';
      logoDiv.innerHTML = `
        <div class="logo-bg"></div>
        <div class="logo-circuits"></div>
        <img class="logo-img" src="Break Logo.png" alt="Lost Boys Breaks">
        <div class="break-info">
          <div class="break-title" id="breakSubtitle">BREAK #001</div>
          <div class="box-info" id="boxInfo">2024 PANINI PRIZM FOOTBALL HOBBY</div>
          <div class="stats-row">
            <div class="stat-item">
              <div class="stat-label">HITS</div>
              <div class="stat-val hits" id="hitTracker">0</div>
            </div>
            <div class="stat-item">
              <div class="stat-label">CLAIMED</div>
              <div class="stat-val claimed" id="teamsClaimed">0/32</div>
            </div>
          </div>
        </div>
      `;
      board.appendChild(logoDiv);
      continue;
    }
    // Skip cells occupied by logo tile (it spans 2x2)
    if ((row === 2 && col === 4) || (row === 3 && col === 3) || (row === 3 && col === 4)) {
      continue;
    }

    // Team tiles
    if (teamIdx < NFL_TEAMS.length) {
      const team = NFL_TEAMS[teamIdx];
      const div = document.createElement('div');
      div.className = 'tile';
      div.id = `team-${team.abbr}`;
      div.style.setProperty('--bg', team.bg);
      div.innerHTML = `
        <div class="check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
        <img class="tile-logo" src="${getLogoUrl(team.abbr)}" alt="${team.name}" onerror="this.style.display='none'">
        <div class="buyer-name" id="buyer-${team.abbr}"></div>
        <div class="tile-abbr">${team.abbr}</div>
      `;
      board.appendChild(div);
      teamIdx++;
    } else {
      // Empty filler cells for remaining spots in row 5
      const filler = document.createElement('div');
      filler.style.background = '#08081a';
      board.appendChild(filler);
    }
  }
}

function updateCounter() {
  const c = Object.keys(boardState).length;
  document.getElementById('teamsClaimed').textContent = `${c}/32`;
}

function applyState() {
  NFL_TEAMS.forEach(team => {
    const slot = document.getElementById(`team-${team.abbr}`);
    const buyer = document.getElementById(`buyer-${team.abbr}`);
    if (slot && boardState[team.abbr]) {
      slot.classList.add('claimed');
      buyer.textContent = boardState[team.abbr];
    } else if (slot) {
      slot.classList.remove('claimed');
      buyer.textContent = '';
    }
  });
  updateCounter();
}

function createSparkles(el) {
  const rect = el.getBoundingClientRect();
  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (Math.PI * 2 * i) / 12;
    const dist = 25 + Math.random() * 35;
    s.style.left = (rect.width / 2) + 'px';
    s.style.top = (rect.height / 2) + 'px';
    s.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
    el.appendChild(s);
    setTimeout(() => s.remove(), 600);
  }
}

function handleCommand(data) {
  if (data.type === 'claim') {
    boardState[data.team] = data.buyer;
    saveState();
    const slot = document.getElementById(`team-${data.team}`);
    slot.classList.add('claimed', 'claim-animate');
    createSparkles(slot);
    document.getElementById(`buyer-${data.team}`).textContent = data.buyer;
    setTimeout(() => slot.classList.remove('claim-animate'), 700);
    updateCounter();
  } else if (data.type === 'unclaim') {
    delete boardState[data.team];
    saveState();
    document.getElementById(`team-${data.team}`).classList.remove('claimed');
    document.getElementById(`buyer-${data.team}`).textContent = '';
    updateCounter();
  } else if (data.type === 'reset') {
    boardState = {};
    saveState();
    applyState();
  } else if (data.type === 'updateHeader') {
    if (data.breakTitle !== undefined) document.getElementById('breakTitle') && (document.getElementById('breakTitle').textContent = data.breakTitle);
    if (data.breakSubtitle) document.getElementById('breakSubtitle').textContent = data.breakSubtitle;
    if (data.boxInfo) document.getElementById('boxInfo').textContent = data.boxInfo;
    if (data.hitTracker) document.getElementById('hitTracker').textContent = data.hitTracker;
  }
}

window.addEventListener('message', e => handleCommand(e.data));
const channel = new BroadcastChannel('nfl-break-board');
channel.onmessage = e => handleCommand(e.data);

applyState();
</script>
</body>
</html>
